name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  engine:
    name: Engine (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: engine/go.mod
          cache-dependency-path: engine/go.sum
      - name: Vet
        run: go vet ./...
      - name: Test (race detector on)
        run: go test -race ./...
      - name: Fuzz order book (30s smoke)
        run: go test -fuzz=FuzzBook -fuzztime=30s ./internal/orderbook
      - name: Benchmark (informational)
        run: go test -bench=. -benchtime=1s -run=^$ ./internal/orderbook

  terminal:
    name: Terminal (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terminal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: terminal/package-lock.json
      - run: npm ci
      - name: Typecheck + build
        run: npm run build
